<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Puertas Japonesas | ShojiChile - Arquitectura y Diseño Zen</title>
    
    <meta name="description" content="Especialistas en Puertas Japonesas Shoji, Mobiliario Minimalista y Remodelaciones Zen en Chile. 20 años de maestría artesanal con orientación Feng Shui.">
    <meta name="keywords" content="Puertas Japonesas, Shoji Chile, Diseño Zen, Feng Shui, Madera Nativa, Casas Modulares">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-[#FAF8F5] text-stone-800 antialiased overflow-x-hidden">

    <aside class="fixed left-0 top-0 h-screen w-24 md:w-64 bg-white border-r border-stone-200 z-50 flex flex-col items-center py-8">
        <div class="flex-none h-[20cm] flex flex-col items-center justify-start gap-8">
            <img src="logo-shojichile.png" alt="Logo ShojiChile" class="w-20 md:w-48 object-contain">
            
            <nav class="flex flex-col gap-6 text-center">
                <a href="#inicio" class="nav-link">Inicio</a>
                <a href="#productos" class="nav-link">Catálogo</a>
                <a href="#cubicador" class="nav-link">Presupuesto</a>
                <a href="#contacto" class="nav-link">Contacto</a>
            </nav>
        </div>
    </aside>

    <main class="ml-24 md:ml-64">
        <section id="inicio" class="h-[90vh] relative flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 bg-[#E3B448]/20 z-10"></div>
            <img src="https://images.unsplash.com/photo-1590381105924-c72589b9ef3f" class="absolute inset-0 w-full h-full object-cover">
            <div class="relative z-20 text-center p-10 bg-white/90 backdrop-blur-sm border border-stone-100" data-aos="fade-up">
                <h1 class="text-4xl md:text-7xl font-serif mb-4 tracking-tight text-stone-900">ShojiChile</h1>
                <p class="text-xl italic font-light text-stone-600">Armonía, Tradición y Diseño Minimalista</p>
            </div>
        </section>

        <section id="productos" class="py-20 px-6 md:px-16">
            <div class="max-w-7xl mx-auto">
                <h2 class="text-3xl font-serif mb-12 border-l-4 border-[#E3B448] pl-6" data-aos="fade-right">Catálogo de Autor</h2>
                <div id="contenedor-catalogo" class="grid grid-cols-1 md:grid-cols-3 gap-10">
                    </div>
            </div>
        </section>

        <section id="cubicador" class="py-20 bg-stone-100 px-6 md:px-16">
            <div id="modulo-presupuesto"></div> </section>
    </main>

    <footer class="ml-24 md:ml-64 border-t border-stone-200 py-10 text-center text-xs tracking-widest text-stone-400 uppercase">
        © 2026 PuertasJaponesas.cl | ShojiChile S.P.A. | Diseño Zen & Feng Shui
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="app.js"></script>
</body>
</html>
